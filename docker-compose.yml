version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spzkb-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./spzkb.db
      - SECRET_KEY=spzkb-secret-key-change-in-production-2024
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
      - DEBUG=False
    volumes:
      - ./backend:/app
      - sqlite_data:/app
    restart: unless-stopped
    command: >
      sh -c "python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spzkb-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
