services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: spzkb-backend
    expose:
      - "8000"
    environment:
      DATABASE_URL: sqlite:////data/spzkb.db
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      DEBUG: "False"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    command: >
      sh -c "python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spzkb-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: spzkb-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-spakar.sasskom.app}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
